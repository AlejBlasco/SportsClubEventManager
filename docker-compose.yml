services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      # Published to the host so tools like SQL Server Management Studio can connect.
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      # $$SA_PASSWORD: double-$ prevents docker compose from expanding it here;
      # the shell inside the container receives $SA_PASSWORD and expands it at runtime.
      # -C trusts the self-signed TLS certificate that the mssql container generates;
      # mssql-tools18 requires explicit trust (unlike the older mssql-tools).
      test:
        - CMD-SHELL
        - '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" || exit 1'
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    ports:
      - "${API_PORT:-5240}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      # Override CORS origins to match the host-mapped web port.
      # Not required for Blazor Server (API calls are server-side, no browser CORS),
      # but kept so the policy remains consistent with future direct-browser scenarios.
      Cors__AllowedOrigins__0: http://localhost:${WEB_PORT:-5123}
      Cors__AllowedOrigins__1: ${WEB_EXTERNAL_URL:-}
      # Required at startup — Program.cs throws if any of these are missing.
      Authentication__JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      # Required by the SeedAdministratorUser migration on first run.
      AdminUser__Password: ${ADMIN_PASSWORD}
    depends_on:
      sqlserver:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-5123}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      # Internal Docker network name — Blazor Server makes server-side calls to the API,
      # so this must point to the api service, not to the host-mapped port.
      ApiSettings__BaseUrl: http://api:8080
    depends_on:
      sqlserver:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  sqlserver_data:
