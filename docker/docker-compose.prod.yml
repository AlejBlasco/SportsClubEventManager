secrets:
  authentication__jwtsettings__secretkey:
    environment: JWT_SECRET_KEY
  authentication__google__clientid:
    environment: GOOGLE_CLIENT_ID
  authentication__google__clientsecret:
    environment: GOOGLE_CLIENT_SECRET
  adminuser__password:
    environment: ADMIN_PASSWORD
  connectionstrings__defaultconnection:
    environment: CONNECTION_STRING

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" || exit 1'
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    image: ghcr.io/alejblasco/sportsclubeventsmanager-api:${APP_VERSION:-latest}
    pull_policy: always
    ports:
      - "${API_PORT:-5240}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      # ConnectionStrings__DefaultConnection, Authentication__JwtSettings__SecretKey,
      # Authentication__Google__ClientId/ClientSecret and AdminUser__Password ARE REMOVED
      # from here: they now arrive as file-based secrets (see "secrets:" below).
      Cors__AllowedOrigins__0: http://localhost:${WEB_PORT:-5123}
      Cors__AllowedOrigins__1: ${WEB_EXTERNAL_URL:-}
    secrets:
      - authentication__jwtsettings__secretkey
      - authentication__google__clientid
      - authentication__google__clientsecret
      - adminuser__password
      - connectionstrings__defaultconnection
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/alejblasco/sportsclubeventsmanager-web:${APP_VERSION:-latest}
    pull_policy: always
    ports:
      - "${WEB_PORT:-5123}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ApiSettings__BaseUrl: http://api:8080
      # ConnectionStrings__DefaultConnection IS REMOVED from here (see "secrets:")
    secrets:
      - connectionstrings__defaultconnection
    depends_on:
      sqlserver:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_data:
