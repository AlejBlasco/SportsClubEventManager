name: CI

on:
  pull_request:
    branches:
      - develop
      - master
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          clean: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore SportsClubEventManager.sln

      - name: Build
        run: dotnet build SportsClubEventManager.sln --configuration Release --no-restore

      - name: Clean test results
        run: |
          rm -rf TestResults
          mkdir -p TestResults

      - name: Unit Tests
        run: |
          dotnet test tests/SportsClubEventManager.Domain/SportsClubEventManager.Domain.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults
          dotnet test tests/SportsClubEventManager.Application/SportsClubEventManager.Application.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults
          dotnet test tests/SportsClubEventManager.Infrastructure/SportsClubEventManager.Infrastructure.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults
          dotnet test tests/SportsClubEventManager.Web.Tests/SportsClubEventManager.Web.Tests.csproj --configuration Release --no-build --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./TestResults

      # - name: Integration Tests
