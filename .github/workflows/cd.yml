name: CD

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    strategy:
      matrix:
        include:
          - service: api
            dockerfile: docker/Dockerfile.api
            image: ghcr.io/alejblasco/sportsclubeventsmanager-api
          - service: web
            dockerfile: docker/Dockerfile.web
            image: ghcr.io/alejblasco/sportsclubeventsmanager-web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Extract version from Directory.Build.props
        id: version
        run: |
          version=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.service }} (local only)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          load: true
          tags: local/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Trivy scan (SARIF)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local/${{ matrix.service }}:${{ github.sha }}
          format: sarif
          output: trivy-${{ matrix.service }}.sarif
          ignore-unfixed: true
          # Secret scanning is already covered by gitleaks (ci.yml) on the git
          # history, so it's skipped here.
          scanners: vuln
          # No severity filter and no exit-code here on purpose: combining
          # format: sarif with severity: CRITICAL crashed this step on GitHub's
          # shared runners with no error output (reproduced 3x in CI across
          # both api/web; did NOT reproduce locally with the same Trivy
          # version/flags). The severity-filtered pass/fail gate now lives in
          # "Fail on CRITICAL vulnerabilities" below, driven off the table
          # report, which has never crashed.

      - name: Trivy scan (full report)
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local/${{ matrix.service }}:${{ github.sha }}
          format: table
          output: trivy-${{ matrix.service }}.txt
          ignore-unfixed: true

      - name: Fail on CRITICAL vulnerabilities
        run: |
          # Every report ends with a "Total: N (..., CRITICAL: n)" summary line,
          # so a plain substring match on "CRITICAL" would always hit even when
          # n is 0 - sum the actual counts instead.
          critical_count=$(grep -oP 'CRITICAL:\s*\K[0-9]+' "trivy-${{ matrix.service }}.txt" | awk '{sum += $1} END {print sum + 0}')
          if [ "$critical_count" -gt 0 ]; then
            echo "::error::Trivy found ${critical_count} CRITICAL vulnerability(ies) with an available fix in ${{ matrix.service }}. See the trivy-${{ matrix.service }} artifact or the Security tab for details."
            exit 1
          fi

      - name: Check image size against baseline
        run: |
          actual_bytes=$(docker image inspect --format='{{.Size}}' local/${{ matrix.service }}:${{ github.sha }})
          baseline_bytes=$(jq -r '.images.${{ matrix.service }}.baselineBytes' docker/image-size-baseline.json)
          warn_threshold_percent=$(jq -r '.warnThresholdPercent' docker/image-size-baseline.json)

          echo "Actual size: ${actual_bytes} bytes. Baseline: ${baseline_bytes} bytes. Warn threshold: ${warn_threshold_percent}%."

          max_allowed_bytes=$(( baseline_bytes + baseline_bytes * warn_threshold_percent / 100 ))
          if [ "$actual_bytes" -gt "$max_allowed_bytes" ]; then
            echo "::warning::Image ${{ matrix.service }} grew beyond the ${warn_threshold_percent}% baseline threshold (baseline: ${baseline_bytes} bytes, actual: ${actual_bytes} bytes). Consider investigating or updating docker/image-size-baseline.json if the growth is intentional."
          fi

      - name: Smoke test
        run: |
          chmod +x .github/scripts/smoke-test.sh
          .github/scripts/smoke-test.sh "${{ matrix.service }}" "local/${{ matrix.service }}:${{ github.sha }}"

      - name: Upload Trivy reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-${{ matrix.service }}
          path: |
            trivy-${{ matrix.service }}.sarif
            trivy-${{ matrix.service }}.txt

      - name: Upload Trivy SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3.36.3
        with:
          sarif_file: trivy-${{ matrix.service }}.sarif
          category: trivy-${{ matrix.service }}

  build-and-push:
    name: Build and push ${{ matrix.service }} image
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - service: api
            dockerfile: docker/Dockerfile.api
            image: ghcr.io/alejblasco/sportsclubeventsmanager-api
          - service: web
            dockerfile: docker/Dockerfile.web
            image: ghcr.io/alejblasco/sportsclubeventsmanager-web

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract version from Directory.Build.props
        id: version
        run: |
          version=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-
            type=raw,value=${{ steps.version.outputs.value }}

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    name: Trigger Portainer redeploy
    runs-on: ubuntu-latest
    needs: build-and-push
    # Required for secrets.PORTAINER_WEBHOOK_URL/TS_OAUTH_* below to resolve -
    # environment secrets are only exposed to jobs that declare this.
    environment: homelab-production

    steps:
      # The homelab (Portainer webhook, /health/*) is only reachable over
      # Tailscale, not the public internet - ubuntu-latest runners are not on
      # the tailnet by default, so join it just for this job's lifetime.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci

      - name: Call Portainer webhook
        env:
          PORTAINER_WEBHOOK_URL: ${{ secrets.PORTAINER_WEBHOOK_URL }}
        if: ${{ env.PORTAINER_WEBHOOK_URL != '' }}
        run: |
          response=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$PORTAINER_WEBHOOK_URL")
          echo "Portainer responded with HTTP $response"
          # Portainer's stack webhook replies 204 No Content on a successful
          # trigger, not 200 - accept any 2xx as success.
          [[ "$response" =~ ^2[0-9]{2}$ ]] || exit 1

  post-deploy-smoke-test:
    name: Smoke test homelab deployment
    runs-on: ubuntu-latest
    needs: deploy
    environment:
      name: homelab-production
      # NOTE: the "environment.url" field only supports a limited set of
      # contexts (env, github, inputs, job, matrix, needs, runner, steps,
      # strategy, vars) - "secrets" is not allowed here (verified with
      # actionlint), unlike inside a step's "env:". If HOMELAB_WEB_URL is
      # only configured as a secret (not also as a repository/environment
      # variable), this URL will simply be blank in the Environments tab;
      # the actual smoke test below still reads it from vars/secrets.
      url: ${{ vars.HOMELAB_WEB_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}
          tags: tag:ci

      - name: Poll /health/live and /health/ready
        env:
          HOMELAB_WEB_URL: ${{ vars.HOMELAB_WEB_URL || secrets.HOMELAB_WEB_URL }}
        run: |
          chmod +x infrastructure/deploy/smoke-test.sh
          infrastructure/deploy/smoke-test.sh

      - name: Report rollback guidance on failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x infrastructure/deploy/find-last-good-tag.sh
          last_good_tag="$(infrastructure/deploy/find-last-good-tag.sh "${{ github.sha }}" || echo 'unknown')"

          {
            echo "### :rotating_light: Homelab smoke test failed"
            echo
            echo "The deployment of \`${{ github.sha }}\` to \`homelab-production\` did not pass the post-deploy smoke test (\`/health/live\` and/or \`/health/ready\`)."
            echo
            echo "Last known good image tag: \`${last_good_tag}\`"
            echo
            echo "To roll back automatically, run:"
            echo '```bash'
            echo "gh workflow run rollback.yml -f version=${last_good_tag#sha-}"
            echo '```'
            echo
            echo "See [\`infrastructure/deploy/DEPLOYMENT_RUNBOOK.md\`](https://github.com/${{ github.repository }}/blob/master/infrastructure/deploy/DEPLOYMENT_RUNBOOK.md) for the manual rollback procedure if the automated rollback is not available."
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::error::Homelab smoke test failed for ${{ github.sha }}. Last known good tag: ${last_good_tag}. See the job summary for rollback instructions."
          exit 1

  tag-deployed-version:
    name: Tag deployed homelab version
    runs-on: ubuntu-latest
    needs: post-deploy-smoke-test
    if: success()
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create and push deployed/homelab/<short-sha> tag
        run: |
          short_sha="$(git rev-parse --short=7 HEAD)"
          tag="deployed/homelab/${short_sha}"

          # This tag is purely for traceability and as the source of truth of
          # valid rollback.yml "version" inputs - it does NOT replace the
          # manual vX.Y.Z release process already used in this repository.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$tag"
          git push origin "$tag"
