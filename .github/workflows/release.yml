name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

jobs:
  create-release:
    name: Create GitHub Release from CHANGELOG.md
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Extract tag version
        id: tag
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Validate Directory.Build.props matches tag
        run: |
          version=$(grep -oP '(?<=<Version>)[^<]+' Directory.Build.props)
          if [ "$version" != "${{ steps.tag.outputs.value }}" ]; then
            echo "::error::Directory.Build.props has <Version>${version}</Version> but the pushed tag is ${{ github.ref_name }} (expected version ${{ steps.tag.outputs.value }}). Bump <Version> in the release PR before tagging, or delete and recreate the tag against the correct commit."
            exit 1
          fi

      - name: Verify CHANGELOG documents this release
        run: |
          chmod +x .github/scripts/extract-changelog-section.sh

          set +e
          .github/scripts/extract-changelog-section.sh "${{ steps.tag.outputs.value }}" CHANGELOG.md > /dev/null
          status=$?
          set -e

          case "$status" in
            0)
              echo "CHANGELOG.md documents real content for ${{ steps.tag.outputs.value }}."
              ;;
            1)
              echo "::error::No se encontró la sección '## [${{ steps.tag.outputs.value }}]' en CHANGELOG.md. ¿Falta el paso de mover '## [Unreleased]' a '## [${{ steps.tag.outputs.value }}] - fecha' en la PR de release?"
              exit 1
              ;;
            2)
              echo "::error::CHANGELOG.md no documenta cambios para la versión ${{ steps.tag.outputs.value }} (sección vacía). Añade entradas a '## [Unreleased]' antes de abrir la PR de release y muévelas a '## [${{ steps.tag.outputs.value }}]' como parte de esa PR."
              exit 1
              ;;
            *)
              echo "::error::Fallo inesperado (código de salida $status) al verificar CHANGELOG.md para la versión ${{ steps.tag.outputs.value }}."
              exit 1
              ;;
          esac

      - name: Extract changelog section
        run: |
          chmod +x .github/scripts/extract-changelog-section.sh
          if ! .github/scripts/extract-changelog-section.sh "${{ steps.tag.outputs.value }}" CHANGELOG.md > release-notes.md; then
            echo "::error::Unexpected failure extracting the CHANGELOG.md section for ${{ steps.tag.outputs.value }}, even though the previous verification step already confirmed it exists and has content."
            exit 1
          fi

      - name: Check for existing release
        id: existing
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            echo "Release ${{ github.ref_name }} already exists, skipping creation."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        if: steps.existing.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flag=()
          if [[ "${{ steps.tag.outputs.value }}" =~ -(rc|beta|alpha) ]]; then
            prerelease_flag=(--prerelease)
          fi

          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file release-notes.md \
            "${prerelease_flag[@]}"
