name: Enforce Branch Protection

on:
  workflow_dispatch:

jobs:
  protect-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Validate ADMIN_TOKEN secret
        env:
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          if [ -z "$ADMIN_TOKEN" ]; then
            echo "::error::Missing required secret ADMIN_TOKEN. Create it with repo admin permissions before running this workflow."
            exit 1
          fi

      # NOTE: enforce_admins is false (both here and for master below) because
      # this repo currently has a single collaborator (repo admin). GitHub
      # never counts a PR author's own review toward
      # required_pull_request_reviews, so with enforce_admins=true and no
      # second collaborator, the admin would be permanently unable to merge
      # any PR. Setting it to false still keeps required_status_checks/
      # required_pull_request_reviews/required_linear_history enforced for
      # everyone else - it only lets an admin use GitHub's "Merge without
      # waiting for requirements" override. Revisit (set back to true) once a
      # second collaborator can review PRs.
      - name: Configure develop protection
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/branches/develop/protection" \
            --input - <<'JSON'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": ["build-and-test"]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1,
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false,
              "require_last_push_approval": false
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": true,
            "required_linear_history": true,
            "lock_branch": false,
            "allow_fork_syncing": true
          }
          JSON

      # NOTE: validate (api) / validate (web) run only against pull_request events
      # targeting master (see .github/workflows/cd.yml), so they are required
      # here but intentionally NOT added to the develop protection step above.
      - name: Configure master protection
        env:
          GH_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          gh api \
            --method PUT \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/branches/master/protection" \
            --input - <<'JSON'
          {
            "required_status_checks": {
              "strict": true,
              "contexts": ["build-and-test", "validate (api)", "validate (web)"]
            },
            "enforce_admins": false,
            "required_pull_request_reviews": {
              "required_approving_review_count": 1,
              "dismiss_stale_reviews": true,
              "require_code_owner_reviews": false,
              "require_last_push_approval": false
            },
            "restrictions": null,
            "allow_force_pushes": false,
            "allow_deletions": false,
            "block_creations": false,
            "required_conversation_resolution": true,
            "required_linear_history": true,
            "lock_branch": false,
            "allow_fork_syncing": true
          }
          JSON
