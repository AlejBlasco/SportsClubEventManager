# Grafana provisioning: data sources (issue #43).
# Loaded automatically on container start from /etc/grafana/provisioning/datasources (mounted
# read-only from this folder — dev: infrastructure/docker-compose/docker-compose.yml; there is no
# equivalent mount in docker-compose.prod.yml, since production has no grafana container of its
# own — see the issue #43 design doc, "Apéndice A"). Fulfils AC 1 of issue #43 ("Grafana instance
# connected to Prometheus as a data source") without any manual UI step.
apiVersion: 1

datasources:
  # Name deliberately distinct from a plain "Prometheus" (issue #43 production incident,
  # 2026-07-14): the homelab's shared "monitoring" Grafana already had a manually-created
  # datasource literally named "Prometheus" (different, auto-generated uid). Provisioning-by-file
  # matches existing datasources by NAME, and reconciling a same-named entry against our fixed
  # "uid: prometheus" crashed Grafana at startup ("Datasource provisioning error: data source not
  # found") — reproduced twice in an isolated container before this fix. Using a distinct name
  # avoids touching the pre-existing datasource at all; the fixed uid is unaffected and still
  # referenced from the alerting rules/dashboard JSON in this same folder.
  - name: SportsClubEventManager - Prometheus
    # Fixed uid so it can be referenced deterministically from the alert rules provisioning file
    # (infrastructure/grafana/provisioning/alerting/rules.yaml) instead of relying on Grafana's
    # auto-generated uid. Not present in the design doc's sketch; added here for stability.
    uid: prometheus
    type: prometheus
    access: proxy
    # Internal Docker network name — resolved through the "sportsclub-network" bridge network
    # shared by grafana/prometheus/api/web in DEVELOPMENT ONLY, never through a published host
    # port. When this file is applied to the homelab's "monitoring" Grafana in production (see
    # "Apéndice A"), this "url" must be adjusted to wherever that stack exposes its own
    # Prometheus — "prometheus:9090" only resolves inside this project's dev-only network.
    url: http://prometheus:9090
    # MUST stay false (2026-07-15 incident): this dashboard/the alert rules in this same folder
    # already reference the datasource by its fixed "uid: prometheus" above, never by "whichever
    # one is default" — isDefault is not needed here. Setting it to true silently flipped the
    # homelab's shared "monitoring" Grafana pre-existing "Prometheus" datasource (uid
    # bfmqzj39p924gd) from is_default=1 to 0 in production, verified via a disposable read-only
    # container against grafana.db — a real side effect on infrastructure shared with other
    # homelab apps, not just this project's. See docs/observability/observability.md.
    isDefault: false
    editable: false
