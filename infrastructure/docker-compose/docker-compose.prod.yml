networks:
  sportsclub-network:
    driver: bridge

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - sportsclub-network
    healthcheck:
      test:
        - CMD-SHELL
        - '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" || exit 1'
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    image: ghcr.io/alejblasco/sportsclubeventsmanager-api:${APP_VERSION:-latest}
    pull_policy: always
    ports:
      - "${API_PORT:-5240}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      Cors__AllowedOrigins__0: http://localhost:${WEB_PORT:-5123}
      Cors__AllowedOrigins__1: ${WEB_EXTERNAL_URL:-}
      # Plain environment variables, not Docker secrets - see DEPLOYMENT_RUNBOOK.md
      # "Known issue" note for why the file-based secrets approach was reverted.
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      Authentication__JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      AdminUser__Password: ${ADMIN_PASSWORD}
    networks:
      - sportsclub-network
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/alejblasco/sportsclubeventsmanager-web:${APP_VERSION:-latest}
    pull_policy: always
    ports:
      - "${WEB_PORT:-5123}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ApiSettings__BaseUrl: http://api:8080
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
    networks:
      - sportsclub-network
    depends_on:
      sqlserver:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  # No "prometheus", "grafana", "node-exporter" or "cadvisor" services here on purpose: the
  # homelab already runs its own independent "monitoring" Portainer stack with all four. Adding
  # a project-owned copy in production would duplicate host/container metrics and risk port
  # collisions with the real ones. api/web still expose /metrics (issue #42); it's scraped by
  # monitoring's own Prometheus via a manual runbook, not by a container from this repository —
  # see ".claude/docs/sdlc/design/issue-42-integracion-prometheus-metricas.md" (Apéndice A) and
  # ".claude/docs/sdlc/design/issue-43-dashboard-grafana-monitorizacion.md" (Apéndice A). All four
  # containers still exist, dev-only, in "docker-compose.yml" (this same folder).

volumes:
  sqlserver_data:
