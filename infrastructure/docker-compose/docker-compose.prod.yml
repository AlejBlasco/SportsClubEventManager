networks:
  sportsclub-network:
    driver: bridge

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - sportsclub-network
    healthcheck:
      test:
        - CMD-SHELL
        - '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" || exit 1'
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    image: ghcr.io/alejblasco/sportsclubeventsmanager-api:${APP_VERSION:-latest}
    pull_policy: always
    ports:
      - "${API_PORT:-5240}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      Cors__AllowedOrigins__0: http://localhost:${WEB_PORT:-5123}
      Cors__AllowedOrigins__1: ${WEB_EXTERNAL_URL:-}
      # Plain environment variables, not Docker secrets - see DEPLOYMENT_RUNBOOK.md
      # "Known issue" note for why the file-based secrets approach was reverted.
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
      Authentication__JwtSettings__SecretKey: ${JWT_SECRET_KEY}
      Authentication__Google__ClientId: ${GOOGLE_CLIENT_ID}
      Authentication__Google__ClientSecret: ${GOOGLE_CLIENT_SECRET}
      AdminUser__Password: ${ADMIN_PASSWORD}
    networks:
      - sportsclub-network
    depends_on:
      sqlserver:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: ghcr.io/alejblasco/sportsclubeventsmanager-web:${APP_VERSION:-latest}
    pull_policy: always
    ports:
      - "${WEB_PORT:-5123}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      ApiSettings__BaseUrl: http://api:8080
      ConnectionStrings__DefaultConnection: ${CONNECTION_STRING}
    networks:
      - sportsclub-network
    depends_on:
      sqlserver:
        condition: service_healthy
      api:
        condition: service_healthy
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      # SECURITY: bound to PROMETHEUS_BIND_ADDRESS, never published without a bind address.
      # The homelab owner MUST set PROMETHEUS_BIND_ADDRESS in the server's .env to the host's
      # Tailscale IP (tailscale0, typically 100.64.0.0/10) or internal network interface —
      # never 0.0.0.0 nor the host's public IP. This is what guarantees, at the Docker level,
      # that port 9090 stays unreachable from the server's public interface regardless of any
      # external firewall rule (see issue #42 design, "Riesgos y Decisiones Abiertas" point 1,
      # and "Apéndice A").
      - "${PROMETHEUS_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sportsclub-network
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqlserver_data:
  prometheus_data:
