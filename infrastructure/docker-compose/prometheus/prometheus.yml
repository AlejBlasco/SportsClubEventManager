global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "sportsclubeventmanager-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: "sportsclubeventmanager-web"
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8080"]
