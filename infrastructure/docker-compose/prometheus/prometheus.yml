global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "sportsclubeventmanager-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8080"]

  - job_name: "sportsclubeventmanager-web"
    metrics_path: /metrics
    static_configs:
      - targets: ["web:8080"]

  # Host resource metrics (CPU, memory, disk) — issue #43, node-exporter service.
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]

  # Per-container resource metrics (api/web/sqlserver/prometheus/grafana) — issue #43, cadvisor
  # service.
  - job_name: "cadvisor"
    static_configs:
      - targets: ["cadvisor:8080"]
