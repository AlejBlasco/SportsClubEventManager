secrets:
  authentication__jwtsettings__secretkey:
    environment: JWT_SECRET_KEY
  authentication__google__clientid:
    environment: GOOGLE_CLIENT_ID
  authentication__google__clientsecret:
    environment: GOOGLE_CLIENT_SECRET
  adminuser__password:
    environment: ADMIN_PASSWORD
  connectionstrings__defaultconnection:
    environment: CONNECTION_STRING
  grafana__admin_password:
    environment: GRAFANA_ADMIN_PASSWORD
  n8n__webhooktoken:
    environment: N8N_WEBHOOK_TOKEN

networks:
  sportsclub-network:
    driver: bridge

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: ${SA_PASSWORD}
      ACCEPT_EULA: "Y"
      MSSQL_PID: Developer
    ports:
      # Published to the host so tools like SQL Server Management Studio can connect.
      - "${SQL_PORT:-1433}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    networks:
      - sportsclub-network
    healthcheck:
      # $$SA_PASSWORD: double-$ prevents docker compose from expanding it here;
      # the shell inside the container receives $SA_PASSWORD and expands it at runtime.
      # -C trusts the self-signed TLS certificate that the mssql container generates;
      # mssql-tools18 requires explicit trust (unlike the older mssql-tools).
      test:
        - CMD-SHELL
        - '/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$$SA_PASSWORD" -C -Q "SELECT 1" || exit 1'
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  api:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.api
    ports:
      - "${API_PORT:-5240}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      # ConnectionStrings__DefaultConnection, Authentication__JwtSettings__SecretKey,
      # Authentication__Google__ClientId/ClientSecret and AdminUser__Password ARE REMOVED
      # from here: they now arrive as file-based secrets (see "secrets:" below).
      Cors__AllowedOrigins__0: http://localhost:${WEB_PORT:-5123}
      Cors__AllowedOrigins__1: ${WEB_EXTERNAL_URL:-}
      # Base URL Web is reachable at from the browser — used to build the OAuth2 redirect back to
      # /oauth-callback (see AuthenticationController.GetWebAppBaseUrl). Without this, it falls
      # back to appsettings' "https://localhost:7123" (Kestrel/Visual Studio's dev port), which
      # isn't reachable through docker compose. Same pattern as WEB_EXTERNAL_URL in
      # docker-compose.prod.yml.
      WebAppBaseUrl: http://localhost:${WEB_PORT:-5123}
      # n8n workflow notifications (issue #37) — Notifications__N8n__WebhookToken arrives via the
      # "secrets:" block below (n8n__webhooktoken), not as an environment variable here, same
      # pattern already used for the rest of api's credentials. Stays disabled by default; only
      # enabled in production once the manual runbook has been executed against the real n8n
      # instance (no project-owned n8n container exists in this file, dev or prod).
      Notifications__N8n__Enabled: ${NOTIFICATIONS_N8N_ENABLED:-false}
      Notifications__N8n__RegistrationConfirmedWebhookUrl: ${NOTIFICATIONS_N8N_REGISTRATION_CONFIRMED_WEBHOOK_URL:-}
      Notifications__N8n__EventUpdatedWebhookUrl: ${NOTIFICATIONS_N8N_EVENT_UPDATED_WEBHOOK_URL:-}
      Notifications__N8n__EventCancelledWebhookUrl: ${NOTIFICATIONS_N8N_EVENT_CANCELLED_WEBHOOK_URL:-}
      Notifications__N8n__EventReminderWebhookUrl: ${NOTIFICATIONS_N8N_EVENT_REMINDER_WEBHOOK_URL:-}
      Notifications__N8n__ReminderIntervalHours__0: "24"
      Notifications__N8n__ReminderIntervalHours__1: "1"
    secrets:
      - authentication__jwtsettings__secretkey
      - authentication__google__clientid
      - authentication__google__clientsecret
      - adminuser__password
      - connectionstrings__defaultconnection
      - n8n__webhooktoken
    networks:
      - sportsclub-network
    depends_on:
      sqlserver:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: docker/Dockerfile.web
    ports:
      - "${WEB_PORT:-5123}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Production}
      # Internal Docker network name — Blazor Server makes server-side calls to the API,
      # so this must point to the api service, not to the host-mapped port.
      ApiSettings__BaseUrl: http://api:8080
      # ConnectionStrings__DefaultConnection IS REMOVED from here (see "secrets:")
    secrets:
      - connectionstrings__defaultconnection
    networks:
      - sportsclub-network
    depends_on:
      sqlserver:
        condition: service_healthy
      api:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
    ports:
      # Bound to 127.0.0.1 by default: Prometheus's UI/API is never published on all interfaces,
      # only reachable from the same machine (dev) or the homelab's internal network/Tailscale
      # VPN (production, see docker-compose.prod.yml) — see issue #42 design, "Riesgos y
      # Decisiones Abiertas" point 1.
      - "${PROMETHEUS_BIND_ADDRESS:-127.0.0.1}:${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sportsclub-network
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

  grafana:
    image: grafana/grafana-oss:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana__admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
      # This is a dev-only container (see "docker-compose.prod.yml" — no grafana/prometheus/
      # node-exporter/cadvisor there at all, the homelab's own pre-existing "monitoring" stack
      # covers production). Anonymous access stays explicitly disabled anyway, for coherence with
      # what's recommended for the homelab's shared Grafana in the Apéndice A runbook.
      GF_AUTH_ANONYMOUS_ENABLED: "false"
    secrets:
      - grafana__admin_password
    ports:
      # Bound to GRAFANA_BIND_ADDRESS, same pattern as "prometheus" above (PROMETHEUS_BIND_ADDRESS)
      # — no Nginx/host process needs to reach this dev-only container from outside this machine.
      - "${GRAFANA_BIND_ADDRESS:-127.0.0.1}:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ../grafana/provisioning:/etc/grafana/provisioning:ro
      - ../grafana/dashboards:/etc/grafana/provisioning/dashboards/json:ro
      - grafana_data:/var/lib/grafana
    networks:
      - sportsclub-network
    depends_on:
      prometheus:
        condition: service_started

  node-exporter:
    image: prom/node-exporter:latest
    command:
      - "--path.rootfs=/host"
    volumes:
      - /:/host:ro,rslave
    pid: host
    networks:
      - sportsclub-network
    # No "ports:" — only reachable within the internal Docker network, scraped by Prometheus.
    # networks: is not shown in the design doc's sketch, but every other service in this file
    # declares it explicitly (same deviation already applied to "prometheus" itself in issue #42):
    # without it, Prometheus could not resolve "node-exporter" by Docker service name.

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - sportsclub-network
    # No "ports:" — only reachable within the internal Docker network, scraped by Prometheus.

volumes:
  sqlserver_data:
  prometheus_data:
  grafana_data:
